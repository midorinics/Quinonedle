<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinone-dle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0915;
            --card: #1c1a2b;
            --correct: #27ae60;
            --partial: #d35400;
            --wrong: #7f1d1d;
            --gold: #d4af37;
            --text: #ffffff;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1a1635 0%, #0b0915 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            color: var(--gold);
            margin: 40px 0 10px 0;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .subtitle {
            font-style: italic;
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .counter-text {
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .main-banner {
            max-width: 400px;
            width: 80%;
            height: auto;
            margin-bottom: 10px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); 
            display: block;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
            z-index: 100;
        }

        input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid #444;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 1.2rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        #suggestions {
            position: absolute;
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
            background: #1c1a2b;
            border-radius: 15px;
            margin-top: 10px;
            padding: 0;
            list-style: none;
            border: 1px solid #444;
            display: none;
        }

        #suggestions li {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #333;
            transition: 0.2s;
        }

        #suggestions li:hover { background: var(--gold); color: black; }

        #suggestions li img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
        }

        .table-container {
            width: 95%;
            overflow-x: auto;
            margin-bottom: 50px;
        }

        table {
            width: 100%;
            min-width: 1000px;
            border-collapse: separate;
            border-spacing: 8px;
        }

        th {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            padding: 10px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        td {
            background: var(--card);
            padding: 15px 5px;
            text-align: center;
            border-radius: 8px;
            font-weight: 700;
            height: 80px;
            vertical-align: middle;
            animation: flipIn 0.6s ease forwards;
        }

        @keyframes flipIn {
            from { transform: rotateX(-90deg); opacity: 0; }
            to { transform: rotateX(0deg); opacity: 1; }
        }

        .portrait-img {
            width: 70px; height: 70px; border-radius: 8px; object-fit: cover; border: 2px solid #444;
        }

        .correct { background-color: var(--correct) !important; }
        .partial { background-color: var(--partial) !important; }
        .wrong { background-color: var(--wrong) !important; }

        .victory-container { display: none; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .victory-banner { background: var(--gold); color: black; padding: 15px 40px; border-radius: 50px; font-weight: bold; font-size: 1.5rem; box-shadow: 0 0 20px var(--gold); margin-bottom: 15px; }
        .btn-reset { background: white; color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-reset:hover { background: var(--gold); transform: scale(1.05); }
    </style>
</head>

        const suggList = document.getElementById('suggestions');
        const tableBody = document.getElementById('results-body');
        const counterDisplay = document.getElementById('guess-counter');

        function resetGame() {
            target = party[Math.floor(Math.random() * party.length)];
            guessCount = 0;
            guessedNames = [];
            counterDisplay.innerText = `Guesses: 0`;
            tableBody.innerHTML = '';
            document.getElementById('victory-container').style.display = 'none';
            input.disabled = false;
            input.value = '';
        }

        resetGame();

        input.addEventListener('focus', () => { showSuggestions(input.value.toLowerCase().trim()); });
        input.addEventListener('input', () => { showSuggestions(input.value.toLowerCase().trim()); });
        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !suggList.contains(e.target)) { suggList.style.display = 'none'; }
        });

        function showSuggestions(val) {
            suggList.innerHTML = '';
            const available = party.filter(p => !guessedNames.includes(p.name));
            const matches = val === '' ? available : available.filter(p => p.name.toLowerCase().includes(val));
            
            if (matches.length > 0) {
                suggList.style.display = 'block';
                matches.forEach(m => {
                    const li = document.createElement('li');
                    li.innerHTML = `<img src="${m.image}" onerror="this.src='https://via.placeholder.com/40'"> <span>${m.name}</span>`;
                    li.onclick = () => { makeGuess(m); input.value = ''; suggList.style.display = 'none'; };
                    suggList.appendChild(li);
                });
            } else { suggList.style.display = 'none'; }
        }

        function makeGuess(guess) {
            guessedNames.push(guess.name);
            guessCount++;
            counterDisplay.innerText = `Guesses: ${guessCount}`;

            const row = document.createElement('tr');
            addCell(row, `<img src="${guess.image}" class="portrait-img" onerror="this.src='https://via.placeholder.com/70'">`, guess.name === target.name ? 'correct' : 'wrong');
            addCell(row, guess.gender, getFeedback(guess.gender, target.gender));
            addCell(row, guess.race, getFeedback(guess.race, target.race));
            addCell(row, guess.class, getFeedback(guess.class, target.class));
            addCell(row, guess.origin, getFeedback(guess.origin, target.origin));
            addCell(row, guess.align, getFeedback(guess.align, target.align, true));
            addCell(row, guess.season, getFeedback(guess.season, target.season, false, true));
            addCell(row, guess.twilight, getFeedback(guess.twilight, target.twilight));
            tableBody.prepend(row);

            if (guess.name === target.name) {
                document.getElementById('victory-container').style.display = 'flex';
                input.disabled = true;
            }
        }

        function addCell(row, content, className) {
            const td = document.createElement('td');
            td.innerHTML = content;
            td.className = className;
            row.appendChild(td);
        }

        function getFeedback(guessVal, targetVal, isAlignment = false, isSeason = false) {
            if (guessVal === targetVal) return 'correct';
            if (isSeason) return 'wrong';
            
            const g = String(guessVal).toLowerCase();
            const t = String(targetVal).toLowerCase();

            if (isAlignment) {
                const gWords = g.split(/\s+/);
                const tWords = t.split(/\s+/);
                const hasMatch = gWords.some(word => tWords.includes(word));
                return hasMatch ? 'partial' : 'wrong';
            }

            const ignoreList = ["of", "and", "the", "&", "no", "unknown", "class", "twilight", "season"];
            const gWords = g.split(/[\s&]+/).filter(w => !ignoreList.includes(w) && w);
            const tWords = t.split(/[\s&]+/).filter(w => !ignoreList.includes(w) && w);
            
            let isPartial = gWords.some(word => tWords.includes(word));
            return isPartial ? 'partial' : 'wrong';
        }
    </script>
